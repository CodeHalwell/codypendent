name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        # `clippy --all-targets --all-features` + `test --workspace` build a heavy
        # tree (tantivy, tree-sitter, sqlx, and every agent-framework provider),
        # which overruns the runner's ~14 GB. Reclaim the preinstalled SDKs we do
        # not use (~20-30 GB) so the build fits.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-}"
          df -h /
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install ripgrep
        # The workspace.search tool shells out to `rg` (Phase 1 STEP 1.7); its
        # integration test needs ripgrep on PATH, which ubuntu-latest lacks.
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace
