# Build downloadable `codypendent` + `codypendentd` executables for Linux and
# macOS. Runs on a version tag (`v1.2.3`) — attaching the tarballs to the
# GitHub Release — or on demand via "Run workflow" (artifacts only).
#
# Windows is not built: the daemon speaks over a Unix domain socket
# (`UnixListener`) and uses Unix signals + process groups, so it does not
# compile on Windows without a named-pipe port. Targets are all NATIVE (no
# cross-compilation) so the release is as robust as possible.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # attach assets to the Release on a tag build

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13 # Intel runner
          - target: aarch64-apple-darwin
            os: macos-latest # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Install the Rust toolchain
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build release binaries
        run: >
          cargo build --release --locked
          --target ${{ matrix.target }}
          --bin codypendent --bin codypendentd

      - name: Package the tarball
        id: package
        shell: bash
        run: |
          dist="codypendent-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/codypendent" "$dist/"
          cp "target/${{ matrix.target }}/release/codypendentd" "$dist/"
          cp README.md ROADMAP.md "$dist/" 2>/dev/null || true
          tar -czf "$dist.tar.gz" "$dist"
          echo "artifact=$dist.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload the build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codypendent-${{ matrix.target }}
          path: ${{ steps.package.outputs.artifact }}
          if-no-files-found: error

      - name: Attach to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.artifact }}
