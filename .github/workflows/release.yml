# Build downloadable `codypendent` + `codypendentd` executables for Linux and
# macOS, and publish a GitHub Release. Three triggers:
#   - a version tag (`v1.2.3`)      → a normal release attached to that tag;
#   - every push to `main`          → a rolling prerelease `v<ver>-build.<run>`,
#                                     so every commit to main cuts + publishes a
#                                     release (as requested);
#   - manual "Run workflow"         → artifacts only.
#
# Windows is not built: the daemon speaks over a Unix domain socket
# (`UnixListener`) and uses Unix signals + process groups, so it does not
# compile on Windows without a named-pipe port. Targets are all NATIVE (no
# cross-compilation) so the release is as robust as possible.
name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # create releases + attach assets (tag builds and rolling main builds)

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13 # Intel runner
          - target: aarch64-apple-darwin
            os: macos-latest # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: Install the Rust toolchain
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build release binaries
        run: >
          cargo build --release --locked
          --target ${{ matrix.target }}
          --bin codypendent --bin codypendentd

      - name: Resolve the workspace version
        id: version
        shell: bash
        run: |
          # The single source of truth is [workspace.package] version in the root
          # Cargo.toml; every crate inherits it via `version.workspace = true`.
          version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package the tarball
        id: package
        shell: bash
        run: |
          dist="codypendent-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/codypendent" "$dist/"
          cp "target/${{ matrix.target }}/release/codypendentd" "$dist/"
          cp README.md ROADMAP.md "$dist/" 2>/dev/null || true
          tar -czf "$dist.tar.gz" "$dist"
          echo "artifact=$dist.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload the build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codypendent-${{ matrix.target }}
          path: ${{ steps.package.outputs.artifact }}
          if-no-files-found: error

      # A tag push (`v1.2.3`) publishes a normal release on that tag. All three
      # matrix jobs target the one release; action-gh-release creates it once and
      # each job attaches its own tarball.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.artifact }}

      # Every push to main cuts a fresh, per-commit prerelease. The tag
      # `v<version>-build.<run_number>` is identical across the three matrix jobs
      # of a run (so they share one release) and distinct for every commit (so
      # each commit publishes its own release). The workflow run creates the tag.
      - name: Publish rolling release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: codypendent v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          target_commitish: ${{ github.sha }}
          prerelease: true
          files: ${{ steps.package.outputs.artifact }}
