schema_version: 1
id: repair-github-check
version: 1
description: Investigate and repair a failed GitHub check in an isolated worktree.

# Multi-agent (investigator → implementer → independent reviewer): the reviewer
# is a separate agent so its judgement is structurally independent of the
# implementer (ADR-008 router justification).
orchestration_reason: independent-review

inputs:
  pull_request:
    type: github_pull_request
    required: true

budget:
  maximum_cost_usd: 5.00
  maximum_duration_seconds: 3600
  maximum_agents: 2

steps:
  - id: inspect
    agent:
      role: investigator
      model_policy: economical-coding
    skill: github.inspect-failed-check
    outputs: [finding]

  - id: patch
    depends_on: [inspect]
    agent:
      role: implementer
      model_policy: coding
    skill: code.repair
    workspace:
      mode: isolated-worktree
    approval: before-write
    outputs: [patch]

  - id: verify
    depends_on: [patch]
    tool: repository.test
    retry:
      attempts: 2
      backoff_seconds: 5
    outputs: [test-result]

  - id: review
    depends_on: [verify]
    agent:
      role: reviewer
      model_policy: review
    outputs: [review]

  - id: publish
    depends_on: [review]
    tool: github.update-pull-request
    approval: always
