# --- ACP agents (delegate a turn; the agent owns its model) ---
[[provider]]
id = "gemini-cli"
name = "Gemini CLI (ACP)"
protocol = "acp"
[[provider.auth]]
kind = "acp"
command = "gemini"
args = ["--acp"]

[[provider]]
id = "claude-code"
name = "Claude Code (ACP)"
protocol = "acp"
[[provider.auth]]
kind = "acp"
command = "npx"
args = ["-y", "@agentclientprotocol/claude-agent-acp"]

[[provider]]
id = "codex"
name = "OpenAI Codex (ACP)"
protocol = "acp"
[[provider.auth]]
kind = "acp"
command = "npx"
args = ["-y", "@agentclientprotocol/codex-acp"]

[[provider]]
id = "opencode"
name = "OpenCode (ACP)"
protocol = "acp"
[[provider.auth]]
kind = "acp"
command = "opencode"
args = ["acp"]

[[provider]]
id = "cursor"
name = "Cursor CLI (ACP)"
protocol = "acp"
[[provider.auth]]
kind = "acp"
command = "agent"
args = ["acp"]
