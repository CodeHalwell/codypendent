# Curated built-in provider catalog. Shadowable/extendable by the user's
# <data_dir>/providers.toml (same shape). Secrets are env-var NAMES only.

# --- Tier 1: frontier direct APIs (OpenAI-compatible unless noted) ---
[[provider]]
id = "openai"
name = "OpenAI"
protocol = "openai-chat"
base_url = "https://api.openai.com/v1"
[[provider.auth]]
kind = "api_key"
env = ["OPENAI_API_KEY"]

[[provider]]
id = "anthropic"
name = "Anthropic (Claude)"
protocol = "anthropic"
base_url = "https://api.anthropic.com"
extra_headers = { "anthropic-version" = "2023-06-01" }
[[provider.auth]]
kind = "api_key"
env = ["ANTHROPIC_API_KEY"]
header = "x-api-key"
prefix = ""

[[provider]]
id = "gemini"
name = "Google Gemini API"
protocol = "openai-chat"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"
[[provider.auth]]
kind = "api_key"
env = ["GEMINI_API_KEY", "GOOGLE_API_KEY"]

[[provider]]
id = "xai"
name = "xAI (Grok)"
protocol = "openai-chat"
base_url = "https://api.x.ai/v1"
[[provider.auth]]
kind = "api_key"
env = ["XAI_API_KEY"]

[[provider]]
id = "deepseek"
name = "DeepSeek"
protocol = "openai-chat"
base_url = "https://api.deepseek.com"
[[provider.auth]]
kind = "api_key"
env = ["DEEPSEEK_API_KEY"]

[[provider]]
id = "mistral"
name = "Mistral"
protocol = "openai-chat"
base_url = "https://api.mistral.ai/v1"
[[provider.auth]]
kind = "api_key"
env = ["MISTRAL_API_KEY"]

[[provider]]
id = "moonshot"
name = "Moonshot AI (Kimi)"
protocol = "openai-chat"
base_url = "https://api.moonshot.ai/v1"
[[provider.auth]]
kind = "api_key"
env = ["MOONSHOT_API_KEY"]

[[provider]]
id = "zhipu"
name = "Zhipu / Z.ai (GLM)"
protocol = "openai-chat"
base_url = "https://api.z.ai/api/paas/v4"
[[provider.auth]]
kind = "api_key"
env = ["ZAI_API_KEY", "ZHIPUAI_API_KEY"]

[[provider]]
id = "minimax"
name = "MiniMax"
protocol = "openai-chat"
base_url = "https://api.minimax.io/v1"
[[provider.auth]]
kind = "api_key"
env = ["MINIMAX_API_KEY"]

[[provider]]
id = "qwen"
name = "Alibaba Qwen (DashScope)"
protocol = "openai-chat"
base_url = "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
[[provider.auth]]
kind = "api_key"
env = ["DASHSCOPE_API_KEY"]

# --- Tier 1: cloud enterprise (catalog entries; cloud-IAM signing is a follow-up) ---
[[provider]]
id = "azure-openai"
name = "Azure OpenAI (Foundry)"
protocol = "openai-chat"
# base_url is per-resource; the user sets it in their providers.toml (…/openai/v1/).
[[provider.auth]]
kind = "api_key"
env = ["AZURE_OPENAI_API_KEY"]
header = "api-key"
prefix = ""

[[provider]]
id = "amazon-bedrock"
name = "AWS Bedrock (mantle, bearer key)"
protocol = "openai-chat"
base_url = "https://bedrock-mantle.us-east-1.api.aws/v1"
[[provider.auth]]
kind = "api_key"
env = ["AWS_BEARER_TOKEN_BEDROCK"]

